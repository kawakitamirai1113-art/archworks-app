<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積依頼 管理 | アーキワークス</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;--card:#FFFFFF;--text:#1A1A18;--text2:#6B6B66;--text3:#ABABAA;
  --border:#E0DED8;--accent:#1A3A2A;--accent-light:#E8F0EB;
  --warn:#C0391B;--warn-light:#FDECEA;--wip:#8A5C00;--wip-light:#FEF4DC;
  --sent-light:#EBEBEA;--radius:12px;--radius-sm:8px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.app{max-width:480px;margin:0 auto;padding:16px 14px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 20px}
.header h1{font-size:18px;font-weight:700}
.header .sub{font-size:11px;color:var(--text2);margin-top:3px;letter-spacing:0.5px;text-transform:uppercase}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-num{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px}
.stat-warn .stat-num{color:var(--warn)}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--text2);font-family:inherit}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card:active{opacity:0.85}
.card.overdue{border-left:3px solid var(--warn)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:15px;font-weight:500}
.card-id{font-size:11px;color:var(--text3);margin-top:2px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap;font-weight:500}
.b-new{background:var(--accent-light);color:var(--accent)}
.b-wip{background:var(--wip-light);color:var(--wip)}
.b-sent{background:var(--sent-light);color:var(--text2)}
.card-work{font-size:12px;color:var(--text2);margin-bottom:9px;line-height:1.5}
.card-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.meta-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px}
.overdue-label{font-size:11px;color:var(--warn);font-weight:500}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:0.5}

/* 音声FAB */
.voice-fab{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  width:68px;height:68px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 4px 20px rgba(26,58,42,0.35);transition:all 0.2s;z-index:50;
  -webkit-tap-highlight-color:transparent;
}
.voice-fab.recording{background:var(--warn);animation:ripple 1.2s infinite}
@keyframes ripple{
  0%{box-shadow:0 0 0 0 rgba(192,57,27,0.4)}
  70%{box-shadow:0 0 0 16px rgba(192,57,27,0)}
  100%{box-shadow:0 0 0 0 rgba(192,57,27,0)}
}
.voice-status{
  position:fixed;bottom:104px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;border-radius:20px;padding:8px 18px;
  font-size:13px;white-space:nowrap;opacity:0;transition:opacity 0.2s;
  pointer-events:none;z-index:50;
}
.voice-status.show{opacity:1}

/* APIバナー */
.api-banner{
  background:var(--wip-light);border:1px solid #E8C96A;border-radius:var(--radius);
  padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--wip);
  display:none;align-items:flex-start;gap:8px;
}
.api-banner i{font-size:18px;flex-shrink:0;margin-top:1px}
.api-input-row{display:flex;gap:8px;margin-top:8px}
.api-input-row input{flex:1;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:inherit;background:#fff;color:var(--text);outline:none}
.api-input-row button{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}

/* モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:var(--card);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideup 0.25s ease}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.sheet h2{font-size:16px;font-weight:700;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-group label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{
  width:100%;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 11px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{height:76px;resize:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-cancel{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-save{background:var(--accent);color:#fff;border:none}

/* AIプレビュー */
.ai-preview{background:var(--accent-light);border:1px solid #B8D4C0;border-radius:var(--radius);padding:12px 14px;margin-bottom:16px}
.ai-preview-title{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.ai-preview-text{font-size:12px;color:var(--text2);line-height:1.6;background:#fff;border-radius:6px;padding:8px 10px;font-style:italic}

/* 詳細 */
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-key{color:var(--text2);flex-shrink:0}
.detail-val{color:var(--text);font-weight:500;text-align:right;max-width:62%;word-break:break-all}
.detail-val.danger{color:var(--warn)}
.status-section{margin-top:18px}
.status-section p{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.status-btns{display:flex;gap:6px}
.status-btns button{flex:1;padding:9px 4px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit}
.status-btns button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.action-btn{width:100%;margin-top:10px;padding:11px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.del-btn{border-color:#F8C9C0;color:var(--warn)}
.close-btn{border:none;color:var(--text3);background:transparent;font-size:13px;margin-top:6px}

/* ローディング */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>見積依頼 管理</h1><div class="sub">Archiworks</div></div>
    <button class="add-btn" onclick="openManual()"><i class="ti ti-plus"></i> 手動追加</button>
  </div>

  <div class="api-banner" id="api-banner">
    <i class="ti ti-key"></i>
    <div style="flex:1">
      <div>🎤 音声AI機能を使うにはAPIキーが必要です</div>
      <div class="api-input-row">
        <input type="password" id="api-key-input" placeholder="sk-ant-...">
        <button onclick="saveApiKey()">保存</button>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">依頼 合計</div></div>
    <div class="stat stat-warn"><div class="stat-num" id="stat-over">0</div><div class="stat-label">⚠ 期限超過</div></div>
    <div class="stat"><div class="stat-num" id="stat-new">0</div><div class="stat-label">未着手</div></div>
    <div class="stat"><div class="stat-num" id="stat-wip">0</div><div class="stat-label">作成中</div></div>
  </div>

  <div class="filter-row">
    <button class="fbtn active" onclick="setFilter('all',this)">すべて</button>
    <button class="fbtn" onclick="setFilter('未着手',this)">未着手</button>
    <button class="fbtn" onclick="setFilter('作成中',this)">作成中</button>
    <button class="fbtn" onclick="setFilter('送付済',this)">送付済</button>
    <button class="fbtn" onclick="setFilter('overdue',this)"><i class="ti ti-alert-triangle"></i> 期限超過</button>
  </div>

  <div id="card-list"></div>
  <div style="height:80px"></div>
</div>

<button class="voice-fab" id="voice-fab" onclick="toggleVoice()">
  <i class="ti ti-microphone" id="voice-icon"></i>
</button>
<div class="voice-status" id="voice-status"></div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">AIが解析中…</div>
</div>

<!-- 確認モーダル -->
<div class="overlay" id="confirm-modal" onclick="if(event.target===this)closeConfirm()">
  <div class="sheet">
    <div class="handle"></div>
    <h2>内容を確認してください</h2>
    <div class="ai-preview">
      <div class="ai-preview-title"><i class="ti ti-sparkles"></i> AIが読み取った内容</div>
      <div class="ai-preview-text" id="ai-transcript"></div>
    </div>
    <div class="form-group"><label>お客様名 *</label><input type="text" id="c-name"></div>
    <div class="form-row">
      <div class="form-group"><label>依頼元</label>
        <select id="c-source"><option>メール</option><option>LINE</option><option>電話</option><option>口頭</option><option>その他</option></select>
      </div>
      <div class="form-group"><label>期限</label><input type="date" id="c-due"></div>
    </div>
    <div class="form-group"><label>工事内容</label><textarea id="c-work"></textarea></div>
    <div class="form-group"><label>担当者</label><input type="text" id="c-person"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="btn-save" onclick="saveConfirmed()">登録する</button>
    </div>
  </div>
</div>

<!-- 手動追加モーダル -->
<div class="overlay" id="manual-modal" onclick="if(event.target===this)closeManual()">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="manual-title">新規 見積依頼</h2>
    <div class="form-group"><label>お客様名 *</label><input type="text" id="m-name" placeholder="例：田中工務店"></div>
    <div class="form-row">
      <div class="form-group"><label>依頼元</label>
        <select id="m-source"><option>メール</option><option>LINE</option><option>電話</option><option>口頭</option><option>その他</option></select>
      </div>
      <div class="form-group"><label>期限</label><input type="date" id="m-due"></div>
    </div>
    <div class="form-group"><label>工事内容</label><textarea id="m-work" placeholder="例：屋根板金 葺き替え工事"></textarea></div>
    <div class="form-group"><label>担当者</label><input type="text" id="m-person" placeholder="例：山田"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeManual()">キャンセル</button>
      <button class="btn-save" onclick="saveManual()">登録する</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="overlay" id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="sheet" id="detail-content"></div>
</div>

<script>
const STATUSES=['未着手','作成中','送付済'];
const SOURCE_ICON={メール:'ti-mail',LINE:'ti-message-circle',電話:'ti-phone',口頭:'ti-user',その他:'ti-dots'};
const BADGE={未着手:'b-new',作成中:'b-wip',送付済:'b-sent'};
let items=JSON.parse(localStorage.getItem('aw_items')||'[]');
let filterMode='all',editId=null,recognition=null,isRecording=false;

function getApiKey(){return localStorage.getItem('aw_api_key')||'';}
function saveApiKey(){
  const key=document.getElementById('api-key-input').value.trim();
  if(!key){alert('APIキーを入力してください');return;}
  localStorage.setItem('aw_api_key',key);
  document.getElementById('api-banner').style.display='none';
  alert('保存しました！🎤 マイクボタンで音声入力できます');
}
function checkApiKey(){
  if(!getApiKey()) document.getElementById('api-banner').style.display='flex';
}

function save(){localStorage.setItem('aw_items',JSON.stringify(items));}
function nextId(){const n=items.length?Math.max(...items.map(i=>parseInt(i.id.replace('AW',''))||0))+1:1;return'AW'+String(n).padStart(3,'0');}
function isOverdue(item){if(!item.due||item.status==='送付済')return false;return new Date(item.due)<new Date(new Date().toDateString());}

function toggleVoice(){
  if(isRecording){stopVoice();return;}
  if(!getApiKey()){
    document.getElementById('api-banner').style.display='flex';
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  startVoice();
}

function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('音声入力はSafariをお使いください（iPhone推奨）');return;}
  recognition=new SR();
  recognition.lang='ja-JP';
  recognition.interimResults=false;
  recognition.maxAlternatives=1;
  isRecording=true;
  document.getElementById('voice-fab').classList.add('recording');
  document.getElementById('voice-icon').className='ti ti-microphone-off';
  showStatus('🎤 話しかけてください…');
  recognition.onresult=(e)=>{
    const text=e.results[0][0].transcript;
    showStatus('AIが解析中…');
    analyzeWithAI(text);
  };
  recognition.onerror=()=>{showStatus('⚠ もう一度お試しください');stopVoice();setTimeout(hideStatus,2000);};
  recognition.onend=()=>stopVoice();
  recognition.start();
}

function stopVoice(){
  isRecording=false;
  document.getElementById('voice-fab').classList.remove('recording');
  document.getElementById('voice-icon').className='ti ti-microphone';
  if(recognition){try{recognition.stop();}catch(e){}}
}

function showStatus(msg){const el=document.getElementById('voice-status');el.textContent=msg;el.classList.add('show');}
function hideStatus(){document.getElementById('voice-status').classList.remove('show');}

async function analyzeWithAI(transcript){
  document.getElementById('loading').classList.add('show');
  hideStatus();
  const today=new Date().toISOString().slice(0,10);
  const yr=new Date().getFullYear();
  const prompt=`あなたは建築板金会社の見積依頼管理システムです。
以下の音声テキストから見積依頼の情報を抽出してJSON形式のみで返してください。説明文は不要です。

音声テキスト：「${transcript}」
今日の日付：${today}

抽出項目：
- name: お客様名・会社名（必須）
- person: 担当者名（「〜さん」「〜の案件」などから抽出、なければ空文字）
- work: 工事内容・現場名
- due: 期限日（YYYY-MM-DD形式。年の記載がなければ${yr}年。不明なら空文字）
- source: 依頼元（「電話」「メール」「LINE」「口頭」「その他」のいずれか。不明なら「口頭」）

例：{"name":"田中工務店","person":"山下","work":"太田邸 屋根板金","due":"${yr}-05-30","source":"口頭"}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content[0].text.trim();
    const json=JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('loading').classList.remove('show');
    openConfirm(transcript,json);
  }catch(e){
    document.getElementById('loading').classList.remove('show');
    if(e.message&&e.message.includes('401')){
      alert('APIキーが正しくありません。再度設定してください。');
      localStorage.removeItem('aw_api_key');
      checkApiKey();
    }else{
      alert('AI解析に失敗しました。手動で入力してください。');
      openManual();
    }
  }
}

function openConfirm(transcript,parsed){
  document.getElementById('ai-transcript').textContent='「'+transcript+'」';
  document.getElementById('c-name').value=parsed.name||'';
  document.getElementById('c-source').value=parsed.source||'口頭';
  document.getElementById('c-due').value=parsed.due||'';
  document.getElementById('c-work').value=parsed.work||'';
  document.getElementById('c-person').value=parsed.person||'';
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('show');}
function saveConfirmed(){
  const name=document.getElementById('c-name').value.trim();
  if(!name){alert('お客様名を入力してください');return;}
  items.push({id:nextId(),name,source:document.getElementById('c-source').value,due:document.getElementById('c-due').value,work:document.getElementById('c-work').value.trim(),person:document.getElementById('c-person').value.trim(),status:'未着手',created:new Date().toISOString().slice(0,10)});
  save();render();closeConfirm();
}

function openManual(){
  editId=null;
  document.getElementById('manual-title').textContent='新規 見積依頼';
  ['m-name','m-due','m-work','m-person'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-source').value='メール';
  document.getElementById('manual-modal').classList.add('show');
}
function closeManual(){document.getElementById('manual-modal').classList.remove('show');}
function saveManual(){
  const name=document.getElementById('m-name').value.trim();
  if(!name){alert('お客様名を入力してください');return;}
  const data={name,source:document.getElementById('m-source').value,due:document.getElementById('m-due').value,work:document.getElementById('m-work').value.trim(),person:document.getElementById('m-person').value.trim()};
  if(editId){const idx=items.findIndex(i=>i.id===editId);if(idx>=0)Object.assign(items[idx],data);}
  else items.push({id:nextId(),...data,status:'未着手',created:new Date().toISOString().slice(0,10)});
  save();render();closeManual();
}

function render(){
  let list=[...items];
  if(filterMode==='overdue')list=list.filter(isOverdue);
  else if(filterMode!=='all')list=list.filter(i=>i.status===filterMode);
  list.sort((a,b)=>{if(isOverdue(a)&&!isOverdue(b))return -1;if(!isOverdue(a)&&isOverdue(b))return 1;return(a.due||'zzz').localeCompare(b.due||'zzz');});
  document.getElementById('stat-total').textContent=items.length;
  document.getElementById('stat-over').textContent=items.filter(isOverdue).length;
  document.getElementById('stat-new').textContent=items.filter(i=>i.status==='未着手').length;
  document.getElementById('stat-wip').textContent=items.filter(i=>i.status==='作成中').length;
  const el=document.getElementById('card-list');
  if(!list.length){el.innerHTML='<div class="empty"><i class="ti ti-inbox"></i>依頼がありません<br><small style="margin-top:8px;display:block">下の🎤ボタンを押して話しかけてください</small></div>';return;}
  el.innerHTML=list.map(item=>{
    const od=isOverdue(item);const icon=SOURCE_ICON[item.source]||'ti-dots';
    return`<div class="card${od?' overdue':''}" onclick="openDetail('${item.id}')">
      <div class="card-top"><div><div class="card-name">${item.name}</div><div class="card-id">${item.id}</div></div><span class="badge ${BADGE[item.status]}">${item.status}</span></div>
      ${item.work?`<div class="card-work">${item.work}</div>`:''}
      <div class="card-meta">
        <span class="meta-item"><i class="ti ${icon}"></i>${item.source}</span>
        ${item.due?`<span class="meta-item"><i class="ti ti-calendar"></i>${item.due}</span>`:''}
        ${item.person?`<span class="meta-item"><i class="ti ti-user"></i>${item.person}</span>`:''}
        ${od?'<span class="overdue-label">⚠ 期限超過</span>':''}
      </div>
    </div>`;
  }).join('');
}

function setFilter(f,btn){filterMode=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function openDetail(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  const od=isOverdue(item);
  document.getElementById('detail-content').innerHTML=`
    <div class="handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0">${item.name}</h2><span class="badge ${BADGE[item.status]}">${item.status}</span>
    </div>
    <div class="detail-row"><span class="detail-key">依頼番号</span><span class="detail-val">${item.id}</span></div>
    <div class="detail-row"><span class="detail-key">依頼元</span><span class="detail-val"><i class="ti ${SOURCE_ICON[item.source]||'ti-dots'}"></i> ${item.source}</span></div>
    ${item.due?`<div class="detail-row"><span class="detail-key">期限</span><span class="detail-val${od?' danger':''}"> ${item.due}${od?' ⚠':''}</span></div>`:''}
    ${item.work?`<div class="detail-row"><span class="detail-key">工事内容</span><span class="detail-val">${item.work}</span></div>`:''}
    ${item.person?`<div class="detail-row"><span class="detail-key">担当者</span><span class="detail-val">${item.person}</span></div>`:''}
    <div class="detail-row"><span class="detail-key">登録日</span><span class="detail-val">${item.created}</span></div>
    <div class="status-section"><p>ステータス変更</p>
      <div class="status-btns">${STATUSES.map(s=>`<button class="${s===item.status?'active':''}" onclick="changeStatus('${id}','${s}')">${s}</button>`).join('')}</div>
    </div>
    <button class="action-btn" onclick="openEdit('${id}')"><i class="ti ti-edit"></i> 内容を編集</button>
    <button class="action-btn del-btn" onclick="deleteItem('${id}')"><i class="ti ti-trash"></i> 削除する</button>
    <button class="action-btn close-btn" onclick="closeDetail()">閉じる</button>`;
  document.getElementById('detail-modal').classList.add('show');
}
function closeDetail(){document.getElementById('detail-modal').classList.remove('show');}
function changeStatus(id,status){const item=items.find(i=>i.id===id);if(item){item.status=status;save();render();openDetail(id);}}
function openEdit(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  closeDetail();editId=id;
  document.getElementById('manual-title').textContent='依頼を編集';
  document.getElementById('m-name').value=item.name;
  document.getElementById('m-source').value=item.source;
  document.getElementById('m-due').value=item.due||'';
  document.getElementById('m-work').value=item.work||'';
  document.getElementById('m-person').value=item.person||'';
  document.getElementById('manual-modal').classList.add('show');
}
function deleteItem(id){
  if(!confirm('この依頼を削除しますか？'))return;
  items=items.filter(i=>i.id!==id);save();render();closeDetail();
}

checkApiKey();
render();
</script>
</body>
</html>
