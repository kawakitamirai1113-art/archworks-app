<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積依頼 管理 | アーキワークス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;
  --card:#FFFFFF;
  --text:#1A1A18;
  --text2:#6B6B66;
  --text3:#ABABAA;
  --border:#E0DED8;
  --accent:#1A3A2A;
  --accent-light:#E8F0EB;
  --accent-text:#1A3A2A;
  --warn:#C0391B;
  --warn-light:#FDECEA;
  --wip:#8A5C00;
  --wip-light:#FEF4DC;
  --sent:#3A3A38;
  --sent-light:#EBEBEA;
  --radius:12px;
  --radius-sm:8px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px}

.app{max-width:480px;margin:0 auto;padding:16px 14px}

.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 20px}
.header-left h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.header-left .sub{font-size:11px;color:var(--text2);margin-top:3px;letter-spacing:0.5px;text-transform:uppercase}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;transition:opacity 0.15s}
.add-btn:active{opacity:0.8}

.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-num{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px}
.stat-warn .stat-num{color:var(--warn)}

.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--text2);font-family:inherit;transition:all 0.15s}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s;-webkit-tap-highlight-color:transparent}
.card:active{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.card.overdue{border-left:3px solid var(--warn)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:15px;font-weight:500}
.card-id{font-size:11px;color:var(--text3);margin-top:2px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap;font-weight:500}
.b-new{background:var(--accent-light);color:var(--accent-text)}
.b-wip{background:var(--wip-light);color:var(--wip)}
.b-sent{background:var(--sent-light);color:var(--sent)}
.card-work{font-size:12px;color:var(--text2);margin-bottom:9px;line-height:1.5}
.card-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.meta-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px}
.meta-item i{font-size:13px;opacity:0.7}
.overdue-label{font-size:11px;color:var(--warn);font-weight:500}

/* モーダル共通 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end;justify-content:center;-webkit-tap-highlight-color:transparent}
.overlay.show{display:flex}
.sheet{background:var(--card);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideup 0.25s ease}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.sheet h2{font-size:16px;font-weight:700;margin-bottom:18px}

.form-group{margin-bottom:14px}
.form-group label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{
  width:100%;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 11px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;
  transition:border-color 0.15s
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{height:76px;resize:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity 0.15s}
.modal-actions button:active{opacity:0.8}
.btn-cancel{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-save{background:var(--accent);color:#fff;border:none}

.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-of-type{border-bottom:none}
.detail-key{color:var(--text2);flex-shrink:0}
.detail-val{color:var(--text);font-weight:500;text-align:right;max-width:62%;word-break:break-all}
.detail-val.danger{color:var(--warn)}

.status-section{margin-top:18px}
.status-section p{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.status-btns{display:flex;gap:6px}
.status-btns button{flex:1;padding:9px 4px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit;transition:all 0.15s}
.status-btns button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.action-btn{width:100%;margin-top:10px;padding:11px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.15s}
.action-btn:hover{background:var(--bg)}
.del-btn{border-color:#F8C9C0;color:var(--warn)}
.close-btn{border:none;color:var(--text3);background:transparent;font-size:13px;margin-top:6px}

.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:0.5}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>見積依頼 管理</h1>
      <div class="sub">Archiworks</div>
    </div>
    <button class="add-btn" onclick="openAdd()"><i class="ti ti-plus"></i> 新規追加</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">依頼 合計</div>
    </div>
    <div class="stat stat-warn">
      <div class="stat-num" id="stat-over">0</div>
      <div class="stat-label">⚠ 期限超過</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-new">0</div>
      <div class="stat-label">未着手</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-wip">0</div>
      <div class="stat-label">作成中</div>
    </div>
  </div>

  <div class="filter-row">
    <button class="fbtn active" onclick="setFilter('all',this)">すべて</button>
    <button class="fbtn" onclick="setFilter('未着手',this)">未着手</button>
    <button class="fbtn" onclick="setFilter('作成中',this)">作成中</button>
    <button class="fbtn" onclick="setFilter('送付済',this)">送付済</button>
    <button class="fbtn" onclick="setFilter('overdue',this)"><i class="ti ti-alert-triangle"></i> 期限超過</button>
  </div>

  <div id="card-list"></div>
</div>

<!-- 新規追加モーダル -->
<div class="overlay" id="add-modal" onclick="if(event.target===this)closeAdd()">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="modal-title">新規 見積依頼</h2>
    <div class="form-group">
      <label>お客様名 *</label>
      <input type="text" id="f-name" placeholder="例：田中工務店">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>依頼元</label>
        <select id="f-source">
          <option>メール</option>
          <option>LINE</option>
          <option>電話</option>
          <option>口頭</option>
          <option>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>期限</label>
        <input type="date" id="f-due">
      </div>
    </div>
    <div class="form-group">
      <label>工事内容</label>
      <textarea id="f-work" placeholder="例：屋根板金 葺き替え工事"></textarea>
    </div>
    <div class="form-group">
      <label>担当者</label>
      <input type="text" id="f-person" placeholder="例：山田">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdd()">キャンセル</button>
      <button class="btn-save" onclick="saveCard()">登録する</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="overlay" id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="sheet" id="detail-content"></div>
</div>

<script>
const STATUSES = ['未着手','作成中','送付済'];
const SOURCE_ICON = {メール:'ti-mail',LINE:'ti-message-circle',電話:'ti-phone',口頭:'ti-user',その他:'ti-dots'};
const BADGE = {未着手:'b-new',作成中:'b-wip',送付済:'b-sent'};
const SLABEL = {未着手:'未着手',作成中:'作成中',送付済:'送付済'};

let items = JSON.parse(localStorage.getItem('aw_items')||'[]');
let filterMode = 'all';
let editId = null;

function save(){localStorage.setItem('aw_items',JSON.stringify(items));}
function nextId(){const n=items.length?Math.max(...items.map(i=>parseInt(i.id.replace('AW',''))||0))+1:1;return'AW'+String(n).padStart(3,'0');}
function isOverdue(item){if(!item.due||item.status==='送付済')return false;return new Date(item.due)<new Date(new Date().toDateString());}

function render(){
  let list=[...items];
  if(filterMode==='overdue') list=list.filter(isOverdue);
  else if(filterMode!=='all') list=list.filter(i=>i.status===filterMode);
  list.sort((a,b)=>{if(isOverdue(a)&&!isOverdue(b))return -1;if(!isOverdue(a)&&isOverdue(b))return 1;return(a.due||'zzz').localeCompare(b.due||'zzz');});

  document.getElementById('stat-total').textContent=items.length;
  document.getElementById('stat-over').textContent=items.filter(isOverdue).length;
  document.getElementById('stat-new').textContent=items.filter(i=>i.status==='未着手').length;
  document.getElementById('stat-wip').textContent=items.filter(i=>i.status==='作成中').length;

  const el=document.getElementById('card-list');
  if(!list.length){el.innerHTML='<div class="empty"><i class="ti ti-inbox"></i>依頼がありません</div>';return;}
  el.innerHTML=list.map(item=>{
    const od=isOverdue(item);
    const icon=SOURCE_ICON[item.source]||'ti-dots';
    return`<div class="card${od?' overdue':''}" onclick="openDetail('${item.id}')">
      <div class="card-top">
        <div><div class="card-name">${item.name}</div><div class="card-id">${item.id}</div></div>
        <span class="badge ${BADGE[item.status]}">${SLABEL[item.status]}</span>
      </div>
      ${item.work?`<div class="card-work">${item.work}</div>`:''}
      <div class="card-meta">
        <span class="meta-item"><i class="ti ${icon}"></i>${item.source}</span>
        ${item.due?`<span class="meta-item"><i class="ti ti-calendar"></i>${item.due}</span>`:''}
        ${item.person?`<span class="meta-item"><i class="ti ti-user"></i>${item.person}</span>`:''}
        ${od?'<span class="overdue-label">⚠ 期限超過</span>':''}
      </div>
    </div>`;
  }).join('');
}

function setFilter(f,btn){
  filterMode=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openAdd(){
  editId=null;
  document.getElementById('modal-title').textContent='新規 見積依頼';
  ['f-name','f-due','f-work','f-person'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-source').value='メール';
  document.getElementById('add-modal').classList.add('show');
}
function closeAdd(){document.getElementById('add-modal').classList.remove('show');}

function saveCard(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('お客様名を入力してください');return;}
  const data={name,source:document.getElementById('f-source').value,due:document.getElementById('f-due').value,work:document.getElementById('f-work').value.trim(),person:document.getElementById('f-person').value.trim()};
  if(editId){
    const idx=items.findIndex(i=>i.id===editId);
    if(idx>=0)Object.assign(items[idx],data);
  }else{
    items.push({id:nextId(),...data,status:'未着手',created:new Date().toISOString().slice(0,10)});
  }
  save();render();closeAdd();
}

function openDetail(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  const od=isOverdue(item);
  document.getElementById('detail-content').innerHTML=`
    <div class="handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0">${item.name}</h2>
      <span class="badge ${BADGE[item.status]}">${SLABEL[item.status]}</span>
    </div>
    <div class="detail-row"><span class="detail-key">依頼番号</span><span class="detail-val">${item.id}</span></div>
    <div class="detail-row"><span class="detail-key">依頼元</span><span class="detail-val"><i class="ti ${SOURCE_ICON[item.source]||'ti-dots'}"></i> ${item.source}</span></div>
    ${item.due?`<div class="detail-row"><span class="detail-key">期限</span><span class="detail-val${od?' danger':''}"> ${item.due}${od?' ⚠':''}</span></div>`:''}
    ${item.work?`<div class="detail-row"><span class="detail-key">工事内容</span><span class="detail-val">${item.work}</span></div>`:''}
    ${item.person?`<div class="detail-row"><span class="detail-key">担当者</span><span class="detail-val">${item.person}</span></div>`:''}
    <div class="detail-row"><span class="detail-key">登録日</span><span class="detail-val">${item.created}</span></div>
    <div class="status-section">
      <p>ステータス変更</p>
      <div class="status-btns">
        ${STATUSES.map(s=>`<button class="${s===item.status?'active':''}" onclick="changeStatus('${id}','${s}')">${SLABEL[s]}</button>`).join('')}
      </div>
    </div>
    <button class="action-btn" onclick="openEdit('${id}')"><i class="ti ti-edit"></i> 内容を編集</button>
    <button class="action-btn del-btn" onclick="deleteItem('${id}')"><i class="ti ti-trash"></i> 削除する</button>
    <button class="action-btn close-btn" onclick="closeDetail()">閉じる</button>
  `;
  document.getElementById('detail-modal').classList.add('show');
}
function closeDetail(){document.getElementById('detail-modal').classList.remove('show');}
function changeStatus(id,status){const item=items.find(i=>i.id===id);if(item){item.status=status;save();render();openDetail(id);}}
function openEdit(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  closeDetail();editId=id;
  document.getElementById('modal-title').textContent='依頼を編集';
  document.getElementById('f-name').value=item.name;
  document.getElementById('f-source').value=item.source;
  document.getElementById('f-due').value=item.due||'';
  document.getElementById('f-work').value=item.work||'';
  document.getElementById('f-person').value=item.person||'';
  document.getElementById('add-modal').classList.add('show');
}
function deleteItem(id){
  if(!confirm('この依頼を削除しますか？'))return;
  items=items.filter(i=>i.id!==id);save();render();closeDetail();
}
render();
</script>
</body>
</html>
